name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: ruff check .
      - name: .env.example drift check
        run: python scripts/check_env_example.py

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_DATABASE: merrymeal
          MYSQL_USER: merrymeal
          MYSQL_PASSWORD: merrymeal
          MYSQL_ROOT_PASSWORD: rootpass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u merrymeal -pmerrymeal"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=12
    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      MYSQL_HOST: 127.0.0.1
      MYSQL_DATABASE: merrymeal
      MYSQL_USER: merrymeal
      MYSQL_PASSWORD: merrymeal
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: |
          sudo apt-get update
          sudo apt-get install -y default-libmysqlclient-dev pkg-config
      - run: pip install -r requirements.txt
      - run: pytest --cov=apps --cov-report=xml --cov-report=term
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage.xml

  frontend:
    name: Frontend (Tailwind build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run build:css
      - name: Fail if compiled CSS changed
        run: |
          if ! git diff --quiet -- static/dist; then
            echo "::error::Compiled CSS differs from committed version."
            git --no-pager diff -- static/dist
            exit 1
          fi

  docker-smoke:
    name: Docker smoke
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - run: cp .env.example .env
      - run: ./tests_e2e/docker_smoke.sh

  release:
    name: Build + push image to GHCR
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [lint, test, frontend]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/merrymeal:latest
            ghcr.io/${{ github.repository_owner }}/merrymeal:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to server
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [release]
    steps:
      - name: SSH in and pull the new image
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -euo pipefail
            cd /srv/merrymeal
            sudo docker compose pull
            sudo docker compose up -d
            sudo docker compose ps
