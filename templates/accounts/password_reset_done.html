{% extends "base.html" %}
{% block title %}Check your email · MerryMeal{% endblock %}

{% block content %}
<section class="flex flex-col gap-8 text-center">
  <header>
    <h1 class="font-display text-5xl font-semibold tracking-tight text-warm-900">Check your email</h1>
    <p class="mt-3 text-warm-600">
      If an account exists for that email, we've sent a reset link.
    </p>
  </header>

  <a href="{% url 'accounts:login' %}" class="btn-secondary mx-auto">Back to sign in</a>
</section>
{% endblock %}
