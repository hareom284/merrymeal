{% extends "base.html" %}
{% block title %}Sign in · MerryMeal{% endblock %}

{% block content %}
<section class="flex flex-col gap-10">
  <header class="text-center">
    <h1 class="font-display text-5xl font-semibold tracking-tight text-warm-900">Sign in</h1>
    <p class="mt-3 text-warm-600">Welcome back to MerryMeal.</p>
  </header>

  <form method="post" class="flex flex-col gap-5" novalidate
        x-data="{ submitting: false }" @submit="submitting = true">
    {% csrf_token %}

    {% if form.non_field_errors %}
      <div class="rounded-2xl bg-red-50 border border-red-200 px-4 py-3 text-red-800" role="alert">
        {{ form.non_field_errors.0 }}
      </div>
    {% endif %}

    <label class="flex flex-col gap-2">
      <span class="label">Email</span>
      {{ form.email }}
    </label>

    <label class="flex flex-col gap-2">
      <span class="label">Password</span>
      {{ form.password }}
    </label>

    <button type="submit" class="btn-primary mt-2"
            :disabled="submitting"
            :class="{ 'opacity-70 cursor-not-allowed': submitting }">
      <span x-show="!submitting">Sign in</span>
      <span x-show="submitting" x-cloak class="inline-flex items-center gap-2">
        <svg class="animate-spin h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
        </svg>
        Signing in&hellip;
      </span>
    </button>

    <a href="{% url 'accounts:password_reset' %}"
       class="mt-1 text-center text-sm text-brand-green underline hover:text-brand-green-hover">
      Forgot password?
    </a>
  </form>
</section>
{% endblock %}
