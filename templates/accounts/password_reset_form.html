{% extends "base.html" %}
{% block title %}Reset password · MerryMeal{% endblock %}

{% block content %}
<section class="flex flex-col gap-10">
  <header class="text-center">
    <h1 class="font-display text-5xl font-semibold tracking-tight text-warm-900">Reset password</h1>
    <p class="mt-3 text-warm-600">Enter your email and we'll send you a reset link.</p>
  </header>

  <form method="post" class="flex flex-col gap-5"
        x-data="{ submitting: false }" @submit="submitting = true">
    {% csrf_token %}

    <label class="flex flex-col gap-2">
      <span class="label">Email</span>
      <input type="email" name="email" required autofocus
             autocomplete="email" inputmode="email"
             placeholder="you@example.com"
             class="input" />
    </label>

    <button type="submit" class="btn-primary mt-2"
            :disabled="submitting"
            :class="{ 'opacity-70 cursor-not-allowed': submitting }">
      <span x-show="!submitting">Send reset link</span>
      <span x-show="submitting" x-cloak class="inline-flex items-center gap-2">
        <svg class="animate-spin h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
        </svg>
        Sending&hellip;
      </span>
    </button>

    <a href="{% url 'accounts:login' %}"
       class="mt-1 text-center text-sm text-brand-green underline hover:text-brand-green-hover">
      Back to sign in
    </a>
  </form>
</section>
{% endblock %}
