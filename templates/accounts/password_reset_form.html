{% extends "base.html" %}
{% block title %}Reset password · MerryMeal{% endblock %}

{% block content %}
<section class="flex flex-col gap-10">
  <header class="text-center">
    <h1 class="font-display text-5xl font-semibold tracking-tight text-warm-900">Reset password</h1>
    <p class="mt-3 text-warm-600">Enter your email and we'll send you a reset link.</p>
  </header>

  <form method="post" class="flex flex-col gap-5">
    {% csrf_token %}

    <label class="flex flex-col gap-2">
      <span class="label">Email</span>
      <input type="email" name="email" required autofocus
             autocomplete="email" inputmode="email"
             placeholder="you@example.com"
             class="input" />
    </label>

    <button type="submit" class="btn-primary mt-2">Send reset link</button>

    <a href="{% url 'accounts:login' %}"
       class="mt-1 text-center text-sm text-brand-green underline hover:text-brand-green-hover">
      Back to sign in
    </a>
  </form>
</section>
{% endblock %}
