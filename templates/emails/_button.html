{% comment %}
  Bullet-proof CTA button — table-based so Outlook 2016 renders it.
  Render with:
    {% include "emails/_button.html" with href="…" label="Call to action" %}
  Optional kwargs:
    color (default "#16a34a") — background colour
{% endcomment %}<table role="presentation" cellpadding="0" cellspacing="0" border="0" style="margin:24px 0;">
  <tr>
    <td align="center" bgcolor="{{ color|default:'#16a34a' }}" style="border-radius:12px; background-color:{{ color|default:'#16a34a' }};">
      <a href="{{ href }}" target="_blank"
         style="display:inline-block; padding:14px 28px; font-size:15px; font-weight:600; color:#ffffff; text-decoration:none; border-radius:12px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;">
        {{ label }}
      </a>
    </td>
  </tr>
</table>
