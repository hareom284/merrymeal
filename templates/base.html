{% load static %}<!DOCTYPE html>
<html lang="en" class="h-full">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#16a34a" />
    <title>{% block title %}MerryMeal{% endblock %}</title>

    <!-- Fonts: Inter (body) + Playfair Display (headings) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap"
    />

    <link rel="stylesheet" href="{% static 'output.css' %}" />

    <!-- HTMX for partial swaps, Alpine for light reactivity -->
    <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
    <script src="https://unpkg.com/alpinejs@3.14.1" defer></script>

    <!-- Story 4.9 — POD offline queue (localStorage + retry on reconnect) -->
    <script src="{% static 'src/volunteer-offline.js' %}" defer></script>
  </head>
  <body class="h-full">
    <main class="mx-auto flex min-h-full max-w-md flex-col px-4 py-8 sm:py-12">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
