{% load static %}<!DOCTYPE html>
<html lang="en" class="h-full">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f766e" />
    <title>{% block title %}MerryMeal{% endblock %}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap" />

    <link rel="stylesheet" href="{% static 'dist/output.css' %}" />
    <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
    <script src="https://unpkg.com/alpinejs@3.14.1" defer></script>
  </head>
  <body class="h-full bg-warm-50 overflow-hidden">
    <div class="flex h-full">
      {% include "_partials/sidebar.html" with active=active %}

      <!-- Main column -->
      <main class="flex-1 overflow-y-auto">
        <!-- Top bar -->
        <header class="flex items-start justify-between px-6 sm:px-10 py-6 border-b border-warm-200 bg-warm-50">
          <div>
            <h1 class="font-display text-2xl text-warm-900">{% block page_title %}{{ page_title }}{% endblock %}</h1>
            <p class="text-warm-500 text-sm mt-0.5">{% block page_subtitle %}{{ today_date_label }}{% endblock %}</p>
          </div>
          <button class="relative w-10 h-10 rounded-xl hover:bg-warm-100 flex items-center justify-center text-warm-700" aria-label="Notifications">
            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9M13.7 21a2 2 0 0 1-3.4 0" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <span class="absolute top-2 right-2 w-2 h-2 rounded-full bg-red-500"></span>
          </button>
        </header>

        <!-- Page content -->
        <div class="px-6 sm:px-10 py-6">
          {% block content %}{% endblock %}
        </div>
      </main>
    </div>
  </body>
</html>
